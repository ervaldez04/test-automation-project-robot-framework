# This workflow will run Test Case

name: Robot Framework CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
 
permissions:
  contents: read
 
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome]
     
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.12.4
   
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip list

      - name: 🗑️ Remove existing ChromeDriver
        run: sudo rm -f /usr/bin/chromedriver

      - name: 🔧 Install matching ChromeDriver
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable chromium-chromedriver
          # Make chromedriver available globally
          sudo ln -s /usr/lib/chromium-browser/chromedriver /usr/local/bin/chromedriver || true
          google-chrome --version
          chromedriver --version

      - name: 🐞 Debug Chrome
        run: |
          google-chrome --version
          chromedriver --version || true
   
      - name: 🧪🖥️ Test with RobotFramework
        run: |
          robot \
                --variable BROWSER:chrome \
                --variable HEADLESS:true \
                --outputdir results \
                .  
         
      - name: 📊 Test Report Generation
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: Report            # Name of the folder
          path: results/          # Path to test results