# This workflow will run Test Case

name: Robot Framework CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
 
permissions:
  contents: read
 
jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        browser: [chrome]
     
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v3
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v3
        with:
          python-version: 3.12.4
   
      - name: 📦 Install dependencies
        run: |
          pip install -r requirements.txt
          pip list

      - name: 🔧 Get latest ChromeDriver version
        run: |
          DRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE")
          echo "Latest ChromeDriver version is $DRIVER_VERSION"
          echo "DRIVER_VERSION=$DRIVER_VERSION" >> $GITHUB_ENV

      - name: 🗑️ Remove existing ChromeDriver
        run: sudo rm -f /usr/bin/chromedriver
          google-chrome --version
          chromedriver --version

      - name: 🔧 Install ChromeDriver first
        run: |
          DRIVER_VERSION=$(curl -s "https://chromedriver.storage.googleapis.com/LATEST_RELEASE")
          echo "Installing ChromeDriver version $DRIVER_VERSION"
          wget "https://chromedriver.storage.googleapis.com/${DRIVER_VERSION}/chromedriver_linux64.zip"
          unzip chromedriver_linux64.zip
          sudo mv chromedriver /usr/local/bin/
          chromedriver --version
          echo "DRIVER_VERSION=$DRIVER_VERSION" >> $GITHUB_ENV

      - name: 🌐 Install matching Google Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl gnupg
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" \
            > /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update
          # Install Chrome pinned to the same major version as ChromeDriver
          CHROME_MAJOR=$(echo $DRIVER_VERSION | cut -d. -f1)
          # Find the latest Chrome package for that major version
          apt-cache madison google-chrome-stable | grep $CHROME_MAJOR | head -1 | awk '{print $3}' > chrome_version.txt
          CHROME_VERSION=$(cat chrome_version.txt)
          echo "Installing Chrome version $CHROME_VERSION to match ChromeDriver $DRIVER_VERSION"
          sudo apt-get install -y google-chrome-stable=$CHROME_VERSION
          chromedriver --version
          google-chrome --version

      - name: 🐞 Debug Chrome
        run: |
          google-chrome --version
          chromedriver --version || true
   
      - name: 🧪🖥️ Test with RobotFramework
        run: |
          robot \
                --variable BROWSER:chrome \
                --variable HEADLESS:true \
                --outputdir results \
                .  
         
      - name: 📊 Test Report Generation
        uses: actions/upload-artifact@v4
        if: success() || failure()
        with:
          name: Report            # Name of the folder
          path: results/          # Path to test results